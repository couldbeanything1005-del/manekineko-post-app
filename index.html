<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>まねきねこ投稿アプリ</title>
  <meta name="description" content="Instagram投稿の下書きを自動作成します" />
  <meta name="theme-color" content="#e8732a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="まねきねこ" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div>
        <h1>🐾 まねきねこ投稿アプリ</h1>
        <p>Instagram投稿の下書きを自動作成</p>
      </div>
      <button class="btn-refresh" id="refreshBtn" title="更新">🔄</button>
    </div>
  </header>

  <main>

    <!-- STEP 1: 投稿タイプ -->
    <div class="card">
      <h2>📌 STEP 1｜投稿の種類を選ぶ</h2>
      <div class="type-selector">
        <button class="type-btn" data-type="diary">
          <span class="emoji">📔</span>
          <span class="label">日常・日記</span>
          <span class="desc">今日あったこと・気づき</span>
        </button>
        <button class="type-btn" data-type="service">
          <span class="emoji">🚕</span>
          <span class="label">サービス紹介</span>
          <span class="desc">料金・使い方・Q&Aなど</span>
        </button>
      </div>
    </div>

    <!-- STEP 2: 画像 -->
    <div class="card">
      <h2>🖼 STEP 2｜画像を選ぶ（任意・最大5枚）</h2>
      <div class="image-picker" id="imagePicker">
        <input type="file" id="imageInput" accept="image/*" multiple />
        <span class="pick-icon">📷</span>
        <span class="pick-text">タップして画像を選ぶ<br><small>JPG・PNG・HEIC対応（自動リサイズ）</small></span>
      </div>
      <div class="image-preview-area" id="imagePreviewArea">
        <div class="image-count" id="imageCount"></div>
        <div class="image-preview-grid" id="imagePreviewGrid"></div>
        <button class="remove-all-images" id="removeAllImages">✕ すべて削除</button>
      </div>
    </div>

    <!-- STEP 3: メモ -->
    <div class="card">
      <h2>✏️ STEP 3｜投稿のメモを入力</h2>
      <textarea
        id="memo"
        placeholder="例）今日は瀬戸市の方を通院送迎した。久しぶりの外出で嬉しそうだった。待合室でも話が弾んだ。"
      ></textarea>
      <div class="memo-actions">
        <span class="char-info" id="charCounter">0文字</span>
        <button class="btn-save-memo" id="saveMemoBtn">💾 メモを保存</button>
      </div>
    </div>

    <!-- 保存済みメモ一覧 -->
    <div class="card saved-memos-card" id="savedMemosCard">
      <h2>📂 保存済みメモ</h2>
      <div id="savedMemosList"></div>
    </div>

    <!-- エラー表示 -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- 生成ボタン -->
    <button class="btn-generate" id="generateBtn">
      🐾 下書きを作成する
    </button>

    <!-- ローディング -->
    <div class="loading" id="loading">
      <div class="loading-spinner"></div>
      <p>下書きを作成しています…<br><small>少々お待ちください</small></p>
    </div>

    <!-- 結果 -->
    <div class="card result-card" id="resultCard">
      <h2>📝 下書きができました！</h2>

      <!-- 表示モード -->
      <div id="draftViewMode">
        <div class="draft-text" id="draftText"></div>
        <div class="result-actions">
          <button class="btn-edit-draft" id="editDraftBtn">✏️ 編集する</button>
          <button class="btn-copy" id="copyBtn">📋 コピーする</button>
        </div>
        <div class="result-actions" style="margin-top: 8px;">
          <button class="btn-save-draft" id="saveDraftBtn">💾 下書きを保存する</button>
          <button class="btn-retry" id="retryBtn">🔄 作り直す</button>
        </div>
      </div>

      <!-- 編集モード -->
      <div id="draftEditMode" style="display:none;">
        <textarea class="draft-edit-textarea" id="draftEditText"></textarea>
        <div class="draft-edit-char"><span id="draftEditCounter">0</span>文字</div>
        <div class="result-actions">
          <button class="btn-edit-done" id="editDoneBtn">✅ 編集完了</button>
          <button class="btn-edit-cancel" id="editCancelBtn">✕ キャンセル</button>
        </div>
      </div>
    </div>

    <!-- 保存済み下書き一覧 -->
    <div class="card saved-drafts-card" id="savedDraftsCard">
      <h2>💾 保存済み下書き</h2>
      <div id="savedDraftsList"></div>
    </div>

    <p class="footer-note">福祉タクシーまねきねこ｜投稿下書きアプリ</p>

  </main>

  <script src="/app.js"></script>

</body>
</html>
